<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="list.css" />
    <title>To Do List</title>
  </head>
  <body>
    <div class="list-card">
      <h1>My To-Do List</h1>
      <ul class="todo-list">
        <li class="list-container">
          <input type="checkbox" name="gaming" id="gaming" />
          <label for="gaming">Exploring gaming keyboards</label>
          <ul class="sub-item">
            <li class="list"><a href="/" class="sub-item-link" target="_blank">Store link</a></li>
          </ul>
        </li>
        <li class="list-container">
          <input type="checkbox" name="report" id="report" />
          <label for="report">Finish the report</label>
          <ul class="sub-item">
            <li class="list"><a href="/" class="sub-item-link" target="_blank">Requst Access</a></li>
          </ul>
        </li>
        <li class="list-container">
          <input type="checkbox" name="phone" id="phone" />
          <label for="phone">View Phone's Warranty</label>
          <ul class="sub-item">
            <li class="list"><a href="/" class="sub-item-link" target="_blank">View Receipts</a></li>
          </ul>
        </li>
        <li class="list-container">
          <input type="checkbox" name="specs" id="specs" />
          <label for="specs">Check Processor Specs</label>
          <ul class="sub-item">
            <li class="list"><a href="/" class="sub-item-link" target="_blank">View Model Number</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
