<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">
      Thank you for taking the timme to help us improve the platform
    </p>

    <form action="" id="survey-form">
      <label for="name" id="name-label">Name</label>
      <input
        required
        type="text"
        name="name"
        id="name"
        placeholder="Enter your Name"
      />
      <br />
      <label for="email" id="email-label">Email</label>
      <input
        required
        type="email"
        name="email"
        id="email"
        placeholder="Enter your email"
      />
      <br />
      <label for="number" id="number-label">Age (Optional)</label>
      <input
        required
        type="number"
        name="number"
        id="number"
        placeholder="Enter your age"
        min="18"
        max="100"
      />
      <br />
      <select name="dropdown" id="dropdown">
        <option selected disabled value="select">Select</option>
        <option value="wow">WOW</option>
        <option value="wew">WEW</option>
      </select>
      <br />

      <input type="radio" name="choice" id="yes-option" value="yes-option" />
      <label for="yes-option">Yes</label>

      <input type="radio" name="choice" id="no-option" value="no-option">
      <label for="no-option">No</label>
      <br>
      <input type="checkbox" name="wow" id="wow" value="wow">
    <label for="wow">wow</label>
    
    <input type="checkbox" name="wew" id="wew" value="wew">
    <label for="wew">wew</label>
    <br>
    <label for="textarea-label">Comments</label>
    <textarea name="comments" id="comment"></textarea>

    <button type="submit" id="submit">Submit form</button>
    </form>
  </body>
</html>
