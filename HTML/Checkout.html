<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
  </head>
  <body>
    <h1>Checkout</h1>
    <section>
      <h2>Your Cart</h2>
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
        alt="Spoon"
      />

      <p>Left-handed spoon</p>
      <p>$29.99</p>
    </section>
    <section>
      <h2>Payment Information</h2>
      <form action="">
        <label for="card-name"
          ><span aria-hidden="true">*</span>Card Name</label
        >
        <input
          required
          type="text"
          name="card-name"
          id="card-name"
          aria-hidden="true"
        />
        <br />
        <label for="card-number"
          ><span aria-hidden="true">*</span>Card Number</label
        >
        <input
          required
          type="text"
          name="card-number"
          id="card-number"
          aria-hidden="true"
          aria-describedby="card-number-help"
        />
        <p id="card-number-help">aweqwijfb</p>
      </form>
    </section>
  </body>
</html>
